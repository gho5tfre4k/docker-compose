version: '3.9'

services:
  app:
    build: .
    image: gho5tfre4k/docker-compose-spring-boot-app:${APP_VERSION:-latest}
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/udemy
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=12345678
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
    networks:
      - docker-compose-network
    restart: always
    depends_on:
      - mysql

# Define the MySQL service
  mysql:
    image: mysql:latest
    container_name: mysql-db
    ports:
      - "3307:3307"
    environment:
      - MYSQL_USER=root
      - MYSQL_ROOT_PASSWORD=12345678
      - MYSQL_DATABASE=udemy
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

## Define the network
networks:
  docker-compose-network:
    driver: bridge

volumes:
  mysql-data: